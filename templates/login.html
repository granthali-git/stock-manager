{% extends "base.html" %}

{% block title %}Login - Stock Manager{% endblock %}

{% block content %}
<style>
body {
    background: linear-gradient(135deg, #1e293b, #0f172a) !important;
    min-height: 100vh;
}
.login-card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
}
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card login-card p-4 bg-white">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-box-seam-fill" viewBox="0 0 16 16">
                            <path fill-rule="evenodd" d="M15.528 2.973a.75.75 0 0 1 .472.696v8.662a.75.75 0 0 1-.472.696l-7.25 2.9a.75.75 0 0 1-.557 0l-7.25-2.9A.75.75 0 0 1 0 12.331V3.669a.75.75 0 0 1 .471-.696L7.443.184a.75.75 0 0 1 .513 0l7.572 2.789h-.001ZM8 1.766 1.762 4.08 8 6.394l6.238-2.314L8 1.766ZM1.5 5.5v6.08l6 2.4V7.9L1.5 5.5Zm7 8.48 6-2.4V5.5l-6 2.4v6.08Z"/>
                        </svg>
                    </div>
                    <h3 class="fw-bold text-dark">Stock Manager</h3>
                    <p class="text-muted small">Sign in to manage your inventory</p>
                </div>
                
                <form method="POST" action="{{ url_for('login') }}" class="needs-validation" novalidate>
                    <!-- Username -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus autocomplete="username">
                        <label for="username">Username</label>
                        <div class="invalid-feedback">Please enter your username.</div>
                    </div>
                    <!-- Password -->
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                        <label for="password">Password</label>
                        <div class="invalid-feedback">Please enter your password.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3 d-flex align-items-center justify-content-center">
                        Login
                    </button>
                </form>
                
                <div class="text-center">
                    <p class="small text-muted mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
