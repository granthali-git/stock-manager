{% extends "base.html" %}

{% block title %}Register - Stock Manager{% endblock %}

{% block content %}
<style>
body {
    background: linear-gradient(135deg, #1e293b, #0f172a) !important;
    min-height: 100vh;
}
.register-card {
    border: none;
    border-radius: 16px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
}
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card register-card p-4 bg-white">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-person-plus-fill" viewBox="0 0 16 16">
                            <path d="M1 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                            <path fill-rule="evenodd" d="M13.5 5a.5.5 0 0 1 .5.5V7h1.5a.5.5 0 0 1 0 1H14v1.5a.5.5 0 0 1-1 0V8h-1.5a.5.5 0 0 1 0-1H13V5.5a.5.5 0 0 1 .5-.5z"/>
                        </svg>
                    </div>
                    <h3 class="fw-bold text-dark">Create Account</h3>
                    <p class="text-muted small">New accounts default to <strong>Staff</strong> permissions. Admins can adjust roles later.</p>
                </div>
                
                <form method="POST" action="{{ url_for('register') }}" class="needs-validation" novalidate>
                    <!-- Username -->
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Username" required autofocus autocomplete="username">
                        <label for="username">Username</label>
                        <div class="invalid-feedback">Please enter a username.</div>
                    </div>
                    <!-- Password -->
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required autocomplete="new-password">
                        <label for="password">Password</label>
                        <div class="invalid-feedback">Please enter a password.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-3 d-flex align-items-center justify-content-center">
                        Register as Staff
                    </button>
                </form>
                
                <div class="text-center">
                    <p class="small text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none fw-semibold">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
