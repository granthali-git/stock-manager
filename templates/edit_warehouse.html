{% extends "base.html" %}
{% block title %}Edit Warehouse - Stock Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <!-- Back Link -->
        <div class="mb-3">
            <a href="{{ url_for('warehouses') }}" class="text-decoration-none d-inline-flex align-items-center text-muted small">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-1" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                </svg>
                Back to Warehouses
            </a>
        </div>

        <div class="card shadow-sm p-4">
            <div class="card-body">
                <!-- Header -->
                <div class="d-flex align-items-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary p-3 rounded-3 me-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="#4f46e5" class="bi bi-pencil-square" viewBox="0 0 16 16">
                            <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                            <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="fw-bold mb-0">Edit Warehouse</h2>
                        <p class="text-muted mb-0 small">Update warehouse details</p>
                    </div>
                </div>

                <form method="POST" action="{{ url_for('edit_warehouse', warehouse_id=warehouse.id) }}">
                    <div class="row g-3">
                        <!-- Name -->
                        <div class="col-12">
                            <label for="name" class="form-label fw-semibold">Warehouse Name *</label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ warehouse.name }}" required autofocus>
                        </div>
                        
                        <!-- Location -->
                        <div class="col-12">
                            <label for="location" class="form-label fw-semibold">Location Address *</label>
                            <input type="text" class="form-control form-control-lg" id="location" name="location" value="{{ warehouse.location }}" required>
                        </div>
                        
                        <!-- Manager Name -->
                        <div class="col-12">
                            <label for="manager_name" class="form-label fw-semibold">Manager Name *</label>
                            <input type="text" class="form-control form-control-lg" id="manager_name" name="manager_name" value="{{ warehouse.manager_name }}" required>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                        <a href="{{ url_for('warehouses') }}" class="btn btn-outline-secondary px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
